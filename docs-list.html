<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>전체 문서 목록 — senskeylab Docs</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, "Noto Sans KR", sans-serif;
      background: #f8fafc;
      color: #222;
    }
     /* 스크롤바 숨김 */
    html {
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none; /* IE */
    }
    html::-webkit-scrollbar {
      display: none; /* Chrome, Safari */
    }
    /* 상단 네비 */
    .nav {
      background: #fff;
      border-bottom: 1px solid #e2e8f0;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .nav-logo {
      font-size: 16px;
      font-weight: 700;
      color: #0f172a;
      text-decoration: none;
    }
    .nav-links a {
      font-size: 13px;
      color: #475569;
      text-decoration: none;
      margin-left: 20px;
    }
    .nav-links a:hover { color: #1A6EBD; }

    /* 헤더 */
    .header {
      background: linear-gradient(135deg, #f7f9fc, #eef4ff);
      border-bottom: 1px solid #e2e8f0;
      padding: 40px 24px;
      text-align: center;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 15px;
      color: #64748b;
    }

    /* 컨텐츠 */
    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 32px 20px 60px;
    }

    /* 필터 */
    .filter {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }
    .filter-btn {
      padding: 7px 18px;
      border: 1.5px solid #1A6EBD;
      border-radius: 20px;
      background: #fff;
      color: #1A6EBD;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-btn.active, .filter-btn:hover {
      background: #1A6EBD;
      color: #fff;
    }

    /* 카운트 */
    .count {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 20px;
    }
    .count b { color: #1A6EBD; }

    /* 그리드 */
    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    /* 카드 */
    .card {
      display: flex;
      border: 1px solid #e2e8f0;
      border-radius: 12px;
      overflow: hidden;
      text-decoration: none;
      color: inherit;
      background: #fff;
      transition: all 0.2s;
    }
    .card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.09);
      transform: translateY(-2px);
      border-color: #1A6EBD;
    }
    .thumb {
      width: 110px;
      min-width: 110px;
      background: linear-gradient(135deg, #eef4ff, #dce8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
      overflow: hidden;
    }
    .thumb img {
      width: 110px;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .body {
      padding: 14px 16px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      flex: 1;
      min-width: 0;
    }
    .category {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: #1A6EBD;
      margin-bottom: 5px;
    }
    .title {
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      line-height: 1.45;
      margin-bottom: 6px;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .summary {
      font-size: 12px;
      color: #64748b;
      line-height: 1.6;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      margin-bottom: 8px;
    }
    .footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: #94a3b8;
    }
    .more { color: #1A6EBD; font-weight: 700; }

    .loading {
      text-align: center;
      padding: 60px;
      color: #aaa;
      grid-column: 1 / -1;
    }

    @media (max-width: 600px) {
      .grid { grid-template-columns: 1fr; }
      .header h1 { font-size: 22px; }
      .thumb { width: 80px; min-width: 80px; }
    }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="https://docs.senskeylab.com">📘 senskeylab Docs</a>
  <div class="nav-links">
    <a href="https://senskeylab.com">홈페이지</a>
    <a href="https://docs.senskeylab.com">문서 홈</a>
  </div>
</nav>

<div class="header">
  <h1>📋 전체 문서 목록</h1>
  <p>senskeylab 기술 문서 및 인사이트 전체 목록입니다.</p>
</div>

<div class="wrap">
  <div class="filter" id="filter"></div>
  <div class="count" id="count"></div>
  <div class="grid" id="grid">
    <div class="loading">문서를 불러오는 중...</div>
  </div>
</div>

<script>
let allDocs = [];

fetch('https://docs.senskeylab.com/index.json')
  .then(r => r.json())
  .then(data => {
    allDocs = data;
    buildFilter(data);
    renderCards(data);
  })
  .catch(() => {
    document.getElementById('grid').innerHTML =
      '<div class="loading">문서를 불러올 수 없습니다.</div>';
  });

function buildFilter(data) {
  const cats = ['전체', ...new Set(data.map(d => d.category))];
  document.getElementById('filter').innerHTML = cats.map(cat =>
    `<button class="filter-btn ${cat==='전체'?'active':''}"
      onclick="doFilter('${cat}', this)">${cat}</button>`
  ).join('');
}

function doFilter(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(cat === '전체' ? allDocs : allDocs.filter(d => d.category === cat));
}

function renderCards(data) {
  document.getElementById('count').innerHTML = `총 <b>${data.length}</b>개 문서`;
  if (!data.length) {
    document.getElementById('grid').innerHTML = '<div class="loading">등록된 문서가 없습니다.</div>';
    return;
  }
  document.getElementById('grid').innerHTML = data.map(item => `
    <a href="${item.url}" target="_blank" class="card">
      <div class="thumb">
        ${item.thumbnail
          ? `<img src="${item.thumbnail}" alt="${item.title}" loading="lazy">`
          : (item.icon || '📄')}
      </div>
      <div class="body">
        <div>
          <div class="category">${item.category}</div>
          <div class="title">${item.title}</div>
          <div class="summary">${item.summary || item.description || ''}</div>
        </div>
        <div class="footer">
          <span>${item.date || ''}</span>
          <span class="more">보기 →</span>
        </div>
      </div>
    </a>
  `).join('');
}
</script>

</body>
</html>
