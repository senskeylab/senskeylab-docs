<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>senskeylab Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'senskeylab Docs',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 0,  // ← 0으로 설정하면 문서 내 제목을 사이드바에 자동 추가하지 않음
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음'
      }
    }
  </script>
  <script>
  window.$docsify = {
    name: 'senskeylab Docs',
    repo: '',
    loadSidebar: true,
    loadNavbar: true,
    subMaxLevel: 0,  // ← 0으로 설정하면 문서 내 제목을 사이드바에 자동 추가하지 않음
    nameLink: 'https://senskeylab.com'
  }
</script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
