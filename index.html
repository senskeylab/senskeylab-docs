<!DOCTYPE html>
<html>
<style>
  .app-nav {
    font-size: 13px;
    padding: 4px 0;
  }

  .app-nav > ul {
    display: flex;
    flex-wrap: nowrap;
    padding: 0;
    margin: 0;
  }

  .app-nav a {
    margin: 0 4px;
    padding: 0 4px;
    white-space: nowrap;
  }

  @media screen and (max-width: 768px) {
    .app-nav {
      font-size: 11.5px;
      right: 2px;
    }

    .app-nav a {
      margin: 0 2px;
      padding: 0 2px;
    }
  }
</style> 
<head>
  <meta charset="UTF-8">
  <title>senskeylab Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'senskeylab Docs',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      nameLink: 'https://senskeylab.com',
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
