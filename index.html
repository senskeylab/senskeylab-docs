<!DOCTYPE html>
<html>
<style>
  /* 네비게이션 폰트 축소 */
  .app-nav {
    font-size: 13px;
  }
  .app-nav a {
    margin: 0 8px;
    white-space: nowrap;
  }

  /* 모바일에서 네비게이션 숨김 — 사이드바로 대체 */
  @media screen and (max-width: 768px) {
    .app-nav {
      display: none !important;
    }
  }
</style>  
<head>
  <meta charset="UTF-8">
  <title>senskeylab Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'senskeylab Docs',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      nameLink: 'https://senskeylab.com',
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
