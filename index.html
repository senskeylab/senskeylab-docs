<!DOCTYPE html>
<html>
<style>
  /* 네비게이션 간격 축소 */
  .app-nav {
    font-size: 13px;
    padding: 6px 0;
  }

  .app-nav a {
    margin: 0 6px;
    white-space: nowrap;
  }

  /* 모바일 추가 축소 */
  @media screen and (max-width: 768px) {
    .app-nav {
      font-size: 12px;
      padding: 4px 0;
      right: 4px;
    }

    .app-nav a {
      margin: 0 4px;
    }
  }

  /* 아주 작은 화면 */
  @media screen and (max-width: 480px) {
    .app-nav {
      font-size: 11px;
    }

    .app-nav a {
      margin: 0 3px;
    }
  }
</style>  
<head>
  <meta charset="UTF-8">
  <title>senskeylab Docs</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/themes/vue.css">
</head>
<body>
  <div id="app"></div>
  <script>
    window.$docsify = {
      name: 'senskeylab Docs',
      repo: '',
      loadSidebar: true,
      loadNavbar: true,
      subMaxLevel: 2,
      nameLink: 'https://senskeylab.com',
      search: {
        placeholder: '검색',
        noData: '검색 결과 없음'
      }
    }
  </script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
  <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
</body>
</html>
